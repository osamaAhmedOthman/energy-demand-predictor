name: CI/CD Pipeline

on:
  push:
    branches: [ main, ci/cd_changes ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create required directories
        run: |
          mkdir -p mlruns
          mkdir -p data
          chmod -R 777 mlruns data

      # CHANGED: 'docker-compose' becomes 'docker compose'
      - name: Start Services with Docker Compose
        run: docker compose up -d

      - name: Wait for services
        run: sleep 10

      # CHANGED: 'docker-compose' becomes 'docker compose'
      - name: Run Pytest inside Container
        run: |
          docker compose exec -T api pytest tests/ --maxfail=3 --disable-warnings -q
        env:
          PYTHONPATH: /app

      # CHANGED: 'docker-compose' becomes 'docker compose'
      - name: Stop and Cleanup
        if: always()
        run: docker compose down