services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./mlruns:/app/mlruns
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    networks:
      - energy-demand-network

  mlflow:
    image: python:3.10-slim
    command: >
      sh -c "
        pip install mlflow &&
        mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./mlruns
      "
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
      - mlflow-db:/mlflow-data
    networks:
      - energy-demand-network

volumes:
  mlflow-db:

networks:
  energy-demand-network:
    driver: bridge
